<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Go WebSocket Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }
        #chat {
            width: 400px;
            height: 300px;
            border: 1px solid #334155;
            padding: 10px;
            overflow-y: auto;
            background: #020617;
            margin-bottom: 10px;
        }
        #message {
            width: 300px;
            padding: 8px;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>WebSocket Chat</h2>

<div>
    <input id="nickname" placeholder="Enter nickname" />
    <button onclick="connect()">Connect</button>
</div>

<div id="chat"></div>

<div>
    <input id="message" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    let ws;

    function connect() {
        const nickname = document.getElementById("nickname").value || "Anonymous";
        ws = new WebSocket(`ws://93.170.121.96:8080/ws?nickname=${nickname}`);

        ws.onopen = () => {
            log("✅ Connected");
        };

        ws.onmessage = (event) => {
            log(event.data);
        };

        ws.onclose = () => {
            log("❌ Disconnected");
        };
    }

    function sendMessage() {
        const input = document.getElementById("message");
        if (ws && input.value) {
            ws.send(input.value);
            input.value = "";
        }
    }

    function log(message) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.textContent = message;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
